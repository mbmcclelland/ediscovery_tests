[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options: verbose output, short traceback, show local vars
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    smoke: Quick smoke tests (run with -m smoke)
    auth: Authentication tests
    ocr: OCR usage report tests
    status: System/realm status tests
    projects: Project management tests
    orgs: Organization management tests
    connectors: Connector management tests
    slow: Long-running tests

# Logging
log_cli = true
log_cli_level = WARNING
